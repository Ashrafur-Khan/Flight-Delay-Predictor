appId: com.flightdelaypredictor.desktop
productName: Flight Delay Predictor
artifactName: ${name}-${version}-${os}-${arch}.${ext}
afterPack: desktop/scripts/sign-macos-backend.mjs
directories:
  output: desktop/dist/installers
files:
  - package.json
  - desktop/**/*.js
  - flight-delay-prediction-form/build/**/*
extraResources:
  - from: desktop/dist/backend/server
    to: backend
    filter:
      - '**/*'
mac:
  category: public.app-category.travel
  minimumSystemVersion: 12.0
  hardenedRuntime: true
  entitlements: desktop/entitlements.mac.plist
  entitlementsInherit: desktop/entitlements.mac.inherit.plist
  target:
    - dmg
win:
  target:
    - nsis
linux:
  target:
    - AppImage
